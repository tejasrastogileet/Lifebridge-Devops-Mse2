services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifebridge-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lifebridge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
