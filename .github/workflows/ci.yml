name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend CI smoke test
        run: npm run test:ci

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=tejasrastogileet_Lifebridge-Devops-Mse2
            -Dsonar.organization=tejasrastogileet
            -Dsonar.sources=.

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t lifebridge-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t lifebridge-frontend:ci ./frontend

      - name: Validate docker-compose build (optional)
        run: docker compose build backend frontend

      - name: Run backend container
        run: docker run -d --name lifebridge-backend-ci -p 5000:5000 -e MONGODB_URI=dummy -e JWT_SECRET=dummysecret12345678901234567890 -e PORT=5000 lifebridge-backend:ci

      - name: Verify container is running
        run: docker ps --filter "name=lifebridge-backend-ci" --filter "status=running"

      - name: Test backend container endpoint (optional)
        run: |
          for i in {1..15}; do
            if curl -fsS http://localhost:5000 >/dev/null; then
              echo "Backend container responded successfully."
              exit 0
            fi
            sleep 2
          done
          echo "Backend container did not respond in time."
          docker logs lifebridge-backend-ci
          exit 1

      - name: Cleanup backend container
        if: always()
        run: docker rm -f lifebridge-backend-ci || true

